name: Update image index

on:
  push:
    paths:
      - 'jeff/images/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rename images and generate index
        run: |

          cd jeff/images

          # build list of existing numbers
          declare -A used

          for f in img_*.*; do
            if [[ $f =~ img_([0-9]+)\. ]]; then
              n=$((10#${BASH_REMATCH[1]}))
              used[$n]=1
            fi
          done

          # find next available number
          next=1
          get_next() {
            while [[ ${used[$next]} ]]; do
              ((next++))
            done
            echo $next
          }

          # rename new uploads
          for f in *; do
            if [[ $f =~ \.(jpg|jpeg|png|gif|webp)$ ]] && [[ ! $f =~ ^img_[0-9]+\. ]]; then

              n=$(get_next)
              used[$n]=1
              next=$((n+1))

              ext="${f##*.}"
              printf -v new "img_%04d.%s" "$n" "$ext"

              git mv "$f" "$new"
            fi
          done

          # regenerate JSON index (multiline format)
          ls -1 | grep -Ei '\.(jpg|jpeg|png|gif|webp)$' | sort | jq -R . | jq -s . > ../images.json

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add jeff/images/*
          git add jeff/images.json
          git commit -m "Auto rename images and update index" || exit 0
          git push
