name: Update image index

on:
  push:
    paths:
      - 'jeff/images/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate images.json
        run: |
          cd jeff/images
          ls -1 | jq -R -s -c 'split("\n")[:-1]' > ../images.json

      - name: Commit updated JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add jeff/images.json
          git commit -m "Auto-update images.json" || exit 0
          git push
