name: Update image index

on:
  push:
    paths:
      - 'jeff/images/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rename new images and generate images.json
        run: |

          cd jeff/images

          # find highest existing img_### number
          max=0
          for f in img_*.*; do
            if [[ $f =~ img_([0-9]+)\. ]]; then
              num=${BASH_REMATCH[1]}
              if ((10#$num > max)); then
                max=$((10#$num))
              fi
            fi
          done

          # rename files that don't match the pattern
          for f in *; do
            if [[ $f =~ \.(jpg|jpeg|png|gif|webp)$ ]] && [[ ! $f =~ ^img_[0-9]+\. ]]; then
              max=$((max+1))
              ext="${f##*.}"
              printf -v new "img_%03d.%s" "$max" "$ext"
              mv "$f" "$new"
            fi
          done

          # regenerate JSON index
          ls -1 | grep -Ei '\.(jpg|jpeg|png|gif|webp)$' | sort | jq -R -s -c 'split("\n")[:-1]' > ../images.json

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add jeff/images/*
          git add jeff/images.json
          git commit -m "Auto-rename images and update index" || exit 0
          git push
